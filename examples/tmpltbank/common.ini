[workflow]
file-retention-level = all_files
start-time = 900000000
end-time = 900010000

[workflow-ifos]
h1 = 
l1 = 
v1 = 

[executables]
aligned2dstack = ${which:pycbc_geom_aligned_2dstack}
alignedbankcat = ${which:pycbc_aligned_bank_cat}
dumptochis = ${which:pycbc_tmpltbank_to_chi_params}
bankverify = ${which:pycbc_bank_verification}
geom_aligned_bank_setup = ${which:pycbc_geom_aligned_bank}

[sharedoptions]
massranges = aligned2dstack,dumptochis,bankverify,geom_aligned_bank_setup
metric = dumptochis,bankverify,geom_aligned_bank_setup
psd = dumptochis,bankverify,geom_aligned_bank_setup
data = dumptochis,bankverify,geom_aligned_bank_setup
ethinca = geom_aligned_bank_setup

[sharedoptions-data]

[sharedoptions-ethinca]

[pegasus_profile-aligned2dstack]

[pegasus_profile-alignedbankcat]

[dumptochis]

[pegasus_profile-dumptochis]

[bankverify]

[pegasus_profile-bankverify]

[pegasus_profile-geom_aligned_bank_setup]
condor|request_memory = 10000

[pegasus_profile]
condor|request_memory = 3000
condor|request_disk = 2.1G
condor|accounting_group = ligo.dev.o4.cbc.bbh.pycbcoffline
pycbc|primary_site = condorpool_symlink
condor|request_cpus = 1

[pegasus_profile-condorpool_symlink]
condor|Requirements = (TARGET.EPNFS =?= True)

