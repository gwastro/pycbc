[workflow]
num-split-jobs = 50

[geom_aligned_bank_setup]
min-match = 0.97
random-seed = 20
filter-points =

[sharedoptions-metric]
pn-order = threePointFivePN
f0 = 60.0
f-low = 60.0
f-upper = 1000.0
delta-f = 0.01

[sharedoptions-psd]
asd-file = ZERO_DET_high_P.txt

[sharedoptions-massranges]
min-mass1 = 1.0
max-mass1 = 5.0
min-mass2 = 1.0
max-mass2 = 5.0
min-chirp-mass = 1.2187707886145738
max-chirp-mass = 2.4375415772291475
min-total-mass = 2.5
max-total-mass = 6
min-eta = 0.16
max-eta = 0.24
max-ns-spin-mag = 0.5
max-bh-spin-mag = 0.9
ns-bh-boundary-mass = 2

[sharedoptions-ethinca]
calculate-time-metric-components =
filter-cutoff = SchwarzISCO

[alignedbankcat]
f-low = ${sharedoptions-metric|f-low}
f-upper = ${sharedoptions-metric|f-upper}

[aligned2dstack]
min-match = ${geom_aligned_bank_setup|min-match}
pn-order = ${sharedoptions-metric|pn-order}
f0 = ${sharedoptions-metric|f0}
stack-distance = 0.2
random-seed = 20
