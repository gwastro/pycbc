config_version = "0"

# Migrated from .codeclimate.yml. See that file's history for the original
# Code Climate configuration this was derived from.
#
# Not carried over (no Qlty equivalent): checks.file-lines, checks.method-count,
# and checks.method-lines. Qlty's file/function complexity smells are based on
# cognitive complexity, not raw line/method counts, so there's no faithful
# translation for these three.

exclude_patterns = [
  "docs/**",
  "tools/**",
  "examples/**",
  "test/**",
]

[[source]]
name = "default"
default = true

# Maintainability thresholds (was `checks:` in .codeclimate.yml)
[smells.function_parameters]
threshold = 30 # was checks.argument-count.threshold

[smells.boolean_logic]
threshold = 4 # was checks.complex-logic.threshold

[smells.nested_control_flow]
threshold = 4 # was checks.nested-control-flow.threshold

[smells.return_statements]
threshold = 4 # was checks.return-statements.threshold

[smells.function_complexity]
enabled = false # was checks.method-complexity.threshold = 1000000 (effectively disabled)

# checks.similar-code / checks.identical-code had no explicit threshold set
# (language defaults), so similar_code / identical_code are left at Qlty's
# defaults here too.

[[plugin]]
name = "pylint"

# was plugins.pylint.checks.import-error.enabled = false
[[triage]]
match.rules = ["pylint:import-error"]
set.ignored = true

# Replaces plugins.pep8; ruff is Qlty's recommended modern Python linter and
# a superset of pep8/pycodestyle, so expect it to surface more than pep8 did.
[[plugin]]
name = "ruff"

# was plugins.fixme (scanned for FIXME/XXX); ripgrep's default lint-fixme
# driver looks for TODO, so it's overridden here to match the old strings.
[[plugin]]
name = "ripgrep"

[plugins.definitions.ripgrep.drivers.lint-fixme]
script = "rg \"FIXME|XXX\" ${target} --json --word-regexp --only-matching"
